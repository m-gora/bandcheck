apiVersion: apps/v1
kind: Deployment
metadata:
  name: bandcheck-backend
  namespace: bandcheck
  labels:
    app: bandcheck-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bandcheck-backend
  template:
    metadata:
      labels:
        app: bandcheck-backend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backend
        image: ghcr.io/m-gora/bandcheck/backend:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: bandcheck-backend-config
              key: NODE_ENV
        - name: AUTH0_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: bandcheck-backend-config
              key: AUTH0_DOMAIN
        - name: AUTH0_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: bandcheck-backend-config
              key: AUTH0_AUDIENCE
        - name: DATABASE_URL
          value: "/app/data/bandcheck.db"
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: bandcheck-backend-config
              key: ALLOWED_ORIGINS
        - name: TURNSTILE_KEY
          valueFrom:
            secretKeyRef:
              name: bandcheck-secret
              key: TURNSTILE_KEY
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bandcheck-backend-data
