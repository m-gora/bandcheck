apiVersion: apps/v1
kind: Deployment
metadata:
  name: bandcheck-frontend
  namespace: bandcheck
  labels:
    app: bandcheck-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bandcheck-frontend
  template:
    metadata:
      labels:
        app: bandcheck-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: frontend
        image: ghcr.io/m-gora/bandcheck/frontend:sha-c565b13
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
            ephemeral-storage: "128Mi"
          limits:
            memory: "128Mi"
            cpu: "200m"
            ephemeral-storage: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
      - name: tmp
        emptyDir: {}
