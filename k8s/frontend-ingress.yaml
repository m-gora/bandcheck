apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bandcheck-frontend
  namespace: bandcheck
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/hostname: bandcheck.marcodoes.tech
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - bandcheck.marcodoes.tech
    secretName: bandcheck-frontend-tls
  rules:
  - host: bandcheck.marcodoes.tech
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bandcheck-frontend
            port:
              number: 80
