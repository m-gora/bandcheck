---
name: Production Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '22.x'

permissions:
  contents: read
  id-token: write

jobs:
  # Deploy to Production Environment
  deploy-production:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build and Deploy Backend
      - name: Setup Node.js for Backend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules (Backend)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-backend-${{ hashFiles('backend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-backend-

      - name: Build Backend
        working-directory: ./backend
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        working-directory: ./backend
        run: |
          # Create functions directory structure at root
          mkdir -p functions shared
          # Copy compiled function files
          cp dist/src/functions/*.js functions/
          cp dist/src/shared/*.js shared/
          # Update package.json main entry for deployment
          node -e "const pkg=require('./package.json'); pkg.main='functions/*.js'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          # Install production dependencies only
          npm ci --production
          # Remove dev files
          rm -rf src scripts tsconfig.json Dockerfile.dev docker-compose.yml dist .env .env.example

      - name: Deploy Backend to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME_PROD }}
          package: './backend'
          respect-funcignore: false

      # Build and Deploy Frontend
      - name: Setup Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules (Frontend)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-frontend-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-frontend-

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
          VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN_PROD }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID_PROD }}
          VITE_AUTH0_REDIRECT_URI: ${{ secrets.VITE_AUTH0_REDIRECT_URI_PROD }}

      - name: Deploy Frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: "dist"
          skip_api_build: true

  # Deploy to Staging Environment
  deploy-staging:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID_STAGING }}
          client-id: ${{ secrets.AZURE_CLIENT_ID_STAGING }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_STAGING }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Deploy backend to staging
      - name: Build and Deploy Backend (Staging)
        working-directory: ./backend
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package (Staging)
        working-directory: ./backend
        run: |
          # Create functions directory structure at root
          mkdir -p functions shared
          # Copy compiled function files
          cp dist/src/functions/*.js functions/
          cp dist/src/shared/*.js shared/
          # Update package.json main entry for deployment
          node -e "const pkg=require('./package.json'); pkg.main='functions/*.js'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          # Install production dependencies only
          npm ci --production
          # Remove dev files
          rm -rf src scripts tsconfig.json Dockerfile.dev docker-compose.yml dist .env .env.example

      - name: Deploy Backend to Azure Functions (Staging)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME_STAGING }}
          package: './backend'
          respect-funcignore: false

      # Deploy frontend to staging
      - name: Build Frontend (Staging)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_STAGING }}
          VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN_STAGING }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID_STAGING }}
          VITE_AUTH0_REDIRECT_URI: ${{ secrets.VITE_AUTH0_REDIRECT_URI_STAGING }}

      - name: Deploy Frontend to Azure Static Web Apps (Staging)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: "dist"
          skip_api_build: true