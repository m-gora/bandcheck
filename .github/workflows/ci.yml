---
name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  NODE_VERSION: '22.x'

jobs:
  # Lint and Test Backend
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-backend-${{ hashFiles('backend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-backend-

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --if-present

      - name: Type check
        run: npm run type-check --if-present

      - name: Build backend
        run: npm run build

      - name: Test backend
        run: npm test --if-present

  # Lint and Test Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-frontend-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-frontend-

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Type check
        run: npm run type-check --if-present

      - name: Build frontend
        run: npm run build
        env:
          # Use dummy values for CI builds
          VITE_API_BASE_URL: "https://api.example.com"
          VITE_AUTH0_DOMAIN: "example.auth0.com"
          VITE_AUTH0_CLIENT_ID: "dummy_client_id"

      - name: Test frontend
        run: npm test --if-present

