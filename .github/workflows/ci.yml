---
name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  NODE_VERSION: '22.x'

jobs:
  # Lint and Test Backend
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint backend
        run: bun run lint --if-present

      - name: Type check
        run: bun run type-check --if-present

      - name: Build backend
        run: bun run build

      - name: Test backend
        run: bun test --if-present

  # Lint and Test Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint frontend
        run: bun run lint --if-present

      - name: Type check
        run: bun run type-check --if-present

      - name: Build frontend
        run: bun run build
        env:
          # Use dummy values for CI builds to satisfy environment checks
          VITE_API_BASE_URL: "https://api.example.com"
          VITE_AUTH0_DOMAIN: "example.auth0.com"
          VITE_AUTH0_CLIENT_ID: "dummy_client_id"

      - name: Test frontend
        run: bun test --if-present