services:
  # Azurite - Local Azure Storage Emulator
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: bandcheck-azurite
    ports:
      - "10000:10000"  # Blob service
      - "10001:10001"  # Queue service  
      - "10002:10002"  # Table service
    volumes:
      - azurite-data:/data
    command: "azurite --silent --location /data --debug /data/debug.log --tableHost 0.0.0.0 --tablePort 10002"
    environment:
      - AZURITE_ACCOUNTS=devstoreaccount1
    networks:
      - bandcheck-network

  # Azure Functions Runtime (optional - for local function testing)
  functions:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bandcheck-functions
    ports:
      - "7071:7071"
    volumes:
      - .:/workspace
      - /workspace/node_modules
    environment:
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - AZURE_TABLES_URL=http://azurite:10002/devstoreaccount1
      - FUNCTIONS_WORKER_RUNTIME=node
      - NODE_ENV=development
    depends_on:
      - azurite
    networks:
      - bandcheck-network
    working_dir: /workspace
    command: npm run start

volumes:
  azurite-data:
    driver: local

networks:
  bandcheck-network:
    driver: bridge