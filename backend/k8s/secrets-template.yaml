# Template for secrets - DO NOT commit actual secrets to git
# Create the actual secret with: kubectl create secret generic bandcheck-secrets --from-literal=...

apiVersion: v1
kind: Secret
metadata:
  name: bandcheck-secrets
  namespace: bandcheck
type: Opaque
stringData:
  auth0-domain: "your-auth0-domain"
  auth0-audience: "https://api.bandcheck.marcodoes.tech"
  azure-tables-url: "https://your-storage.table.core.windows.net"
  azure-storage-account-name: "your-storage-account"
  azure-client-id: "your-azure-client-id"
