apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bandcheck-backend
  namespace: bandcheck
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.bandcheck.marcodoes.tech
    secretName: bandcheck-backend-tls
  rules:
  - host: api.bandcheck.marcodoes.tech
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bandcheck-backend
            port:
              number: 80
