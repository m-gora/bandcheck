apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bandcheck-backend-data
  namespace: bandcheck
  labels:
    app: bandcheck-backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Uncomment and specify storageClassName if needed for your cluster
  # storageClassName: local-path
