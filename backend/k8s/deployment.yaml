apiVersion: apps/v1
kind: Deployment
metadata:
  name: bandcheck-backend
  namespace: bandcheck
  labels:
    app: bandcheck-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bandcheck-backend
  template:
    metadata:
      labels:
        app: bandcheck-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/m-gora/bandcheck/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        - name: AUTH0_DOMAIN
          valueFrom:
            secretKeyRef:
              name: bandcheck-secrets
              key: auth0-domain
        - name: AUTH0_AUDIENCE
          valueFrom:
            secretKeyRef:
              name: bandcheck-secrets
              key: auth0-audience
        - name: DATABASE_URL
          value: "/app/data/bandcheck.db"
        - name: ALLOWED_ORIGINS
          value: "https://bandcheck.marcodoes.tech,http://localhost:5173"
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bandcheck-backend-data
